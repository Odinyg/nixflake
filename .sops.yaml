# YAML anchors for key reuse
keys:
  # Desktop hosts
  - &laptop age1nw5rh8gcg2lzz20znnmrfn5nx62waprnrez8qg2wf9c2f698vaxsu662gp
  - &station age1nw5rh8gcg2lzz20znnmrfn5nx62waprnrez8qg2wf9c2f698vaxsu662gp
  - &vnpc21 age1nw5rh8gcg2lzz20znnmrfn5nx62waprnrez8qg2wf9c2f698vaxsu662gp
  # Homelab servers
  - &homelab_low age1p2gy6kqvj5gfz8enpf8adh652rpkqvu4muzrg2nf7f98sl45qgkspaah7f
  - &homelab_general age1knseevsr30xnq67wuhfrtlfw43ryz4hgch3y0ae4rlppfdss6p7q0pqt6u
  - &pulse age1pxp8l64sgske7kqqedst69pzufwjark5n3dxcl3u5crkfvzcffzsrxlmlu
  - &homelab_critical age1l4q60pec49kr6cphaj80kunh7n6jt8cxan042lhac4herj0pqywquzxw5x
  - &spiders age1wzsxtp6lsz8kun683eky3rfx5c5m9z8fwn0g547dtqfmaajs75vq7xs5an

creation_rules:
  # Shared desktop secrets (all PCs)
  - path_regex: secrets/secrets\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *laptop
          - *vnpc21
          - *station

  # Per-desktop secrets
  - path_regex: secrets/laptop\.yaml$
    key_groups:
      - age:
          - *laptop
  - path_regex: secrets/station\.yaml$
    key_groups:
      - age:
          - *station
  - path_regex: secrets/vnpc-21\.yaml$
    key_groups:
      - age:
          - *vnpc21

  # Homelab secrets — 3-tier model
  - path_regex: secrets/byob\.yaml$
    key_groups:
      - age:
          - *homelab_low
  - path_regex: secrets/psychosocial\.yaml$
    key_groups:
      - age:
          - *homelab_critical
  - path_regex: secrets/pulse\.yaml$
    key_groups:
      - age:
          - *homelab_general
          - *pulse
  - path_regex: secrets/spiders\.yaml$
    key_groups:
      - age:
          - *spiders
  - path_regex: secrets/(sugar|shared)\.yaml$
    key_groups:
      - age:
          - *homelab_general
